<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄少的鱼塘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .hint {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .key-hint {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }

        .image-container {
            margin: 20px 0;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: opacity 0.3s ease;
        }

        .loading {
            color: #667eea;
            font-size: 18px;
        }

        .error {
            color: #e74c3c;
            font-size: 16px;
            padding: 20px;
        }

        .status {
            margin-top: 15px;
            color: #666;
            font-size: 13px;
        }

        .btn-refresh {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .counter {
            margin-top: 10px;
            color: #999;
            font-size: 12px;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 14px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 15px rgba(149, 165, 166, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>黄少的鱼塘</h1>
        <p class="hint">按 <span class="key-hint">空格键</span> 或点击按钮刷新图片</p>

        <div class="image-container" id="imageContainer">
            <p class="loading">加载中...</p>
        </div>

        <button class="btn-refresh" onclick="fetchImage()">刷新图片</button>

        <p class="status" id="status">正在加载...</p>
        <p class="counter" id="counter">本次已加载: 0 张 | 历史累计: 0 张</p>
        <!-- <button class="btn-reset" onclick="resetCounter()">重置计数</button> -->
    </div>

    <script>
        let imageCount = 0;
        let totalImageCount = 0;

        // 从本地存储加载累计数量
        function loadCounter() {
            const saved = localStorage.getItem('totalImageCount');
            if (saved !== null) {
                totalImageCount = parseInt(saved, 10);
            } else {
                totalImageCount = 0;
            }
            updateCounterDisplay();
        }

        // 保存累计数量到本地存储
        function saveCounter() {
            localStorage.setItem('totalImageCount', totalImageCount.toString());
        }

        // 更新计数显示
        function updateCounterDisplay() {
            const counter = document.getElementById('counter');
            counter.textContent = `本次已加载: ${imageCount} 张 | 历史累计: ${totalImageCount} 张`;
        }

        // 重置计数器
        function resetCounter() {
            if (confirm('确定要重置历史累计数量吗？此操作不可撤销。')) {
                imageCount = 0;
                totalImageCount = 0;
                saveCounter();
                updateCounterDisplay();
                const status = document.getElementById('status');
                status.textContent = '计数器已重置';
            }
        }

        async function fetchImage() {
            const container = document.getElementById('imageContainer');
            const status = document.getElementById('status');

            // 显示加载状态
            container.innerHTML = '<p class="loading">加载中...</p>';
            status.textContent = '正在请求API...';

            try {
                const response = await fetch('https://api.qqsuu.cn/api/dm-littlesister?type=json');
                const data = await response.json();

                if (data && data.img) {
                    // 创建图片元素
                    const img = document.createElement('img');
                    img.src = data.img;
                    img.alt = '小姐姐图片';

                    // 图片加载完成
                    img.onload = function () {
                        imageCount++;
                        totalImageCount++;
                        saveCounter(); // 保存到本地存储
                        updateCounterDisplay();
                        status.textContent = '加载成功！按空格键继续';
                    };

                    // 图片加载失败
                    img.onerror = function () {
                        status.textContent = '图片加载失败，请重试';
                    };

                    container.innerHTML = '';
                    container.appendChild(img);
                } else {
                    container.innerHTML = '<p class="error">API返回数据格式错误</p>';
                    status.textContent = '数据格式错误';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p class="error">网络请求失败，请检查网络连接</p>';
                status.textContent = '请求失败';
            }
        }

        // 监听键盘事件
        document.addEventListener('keydown', function (event) {
            if (event.code === 'Space') {
                event.preventDefault(); // 阻止页面滚动
                fetchImage();
            }
        });

        // 页面加载时初始化
        window.onload = function () {
            loadCounter(); // 加载本地存储的计数
            fetchImage();
        };
    </script>
</body>

</html>
