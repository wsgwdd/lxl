
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄少的鱼塘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .hint {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .key-hint {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }

        .image-container {
            margin: 20px 0;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: opacity 0.3s ease;
        }

        .loading {
            color: #667eea;
            font-size: 18px;
        }

        .error {
            color: #e74c3c;
            font-size: 16px;
            padding: 20px;
        }

        .status {
            margin-top: 15px;
            color: #666;
            font-size: 13px;
        }

        .btn-refresh {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .counter {
            margin-top: 10px;
            color: #999;
            font-size: 12px;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 14px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 15px rgba(149, 165, 166, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>黄少的鱼塘</h1>
        <p class="hint">按 <span class="key-hint">空格键</span> 或点击按钮刷新图片</p>

        <div class="image-container" id="imageContainer">
            <p class="loading">加载中...</p>
        </div>

        <button class="btn-refresh" onclick="showNextImage()">刷新图片</button>

        <p class="status" id="status">正在加载...</p>
        <p class="counter" id="counter">本次已加载: 0 张 | 历史累计: 0 张</p>
    </div>

    <script>
        let imageCount = 0;
        let totalImageCount = 0;
        let currentPage = 1;
        let currentImageIndex = 0;
        let imageList = [];
        let isLoading = false;

        // 从本地存储加载累计数量
        function loadCounter() {
            const saved = localStorage.getItem('totalImageCount');
            if (saved !== null) {
                totalImageCount = parseInt(saved, 10);
            } else {
                totalImageCount = 0;
            }
            updateCounterDisplay();
        }

        // 保存累计数量到本地存储
        function saveCounter() {
            localStorage.setItem('totalImageCount', totalImageCount.toString());
        }

        // 更新计数显示
        function updateCounterDisplay() {
            const counter = document.getElementById('counter');
            counter.textContent = `本次已加载: ${imageCount} 张 | 历史累计: ${totalImageCount} 张`;
        }

        // 从wallhaven获取图片列表
        async function fetchImagesFromPage(page) {
            const status = document.getElementById('status');
            status.textContent = `正在加载第 ${page} 页...`;

            try {
                const url = `https://wallhaven.cc/search?q=little%20girl%20Asian&categories=101&purity=010&sorting=date_added&order=desc&page=${page}`;
                
                // 使用CORS代理（因为wallhaven可能不允许跨域）
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                
                const response = await fetch(proxyUrl);
                const html = await response.text();

                // 解析HTML，提取图片地址
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 查找所有缩略图
                const imgElements = doc.querySelectorAll('.thumb-listing-page li img');
                const images = [];
                
                imgElements.forEach(img => {
                    const dataSrc = img.getAttribute('data-src');
                    if (dataSrc) {
                        // 将缩略图URL转换为原图URL
                        // wallhaven缩略图格式: https://th.wallhaven.cc/small/xxx/xxx.jpg
                        // 原图格式: https://w.wallhaven.cc/full/xxx/xxx.jpg
                        const fullUrl = dataSrc.replace('th.wallhaven.cc/small', 'w.wallhaven.cc/full');
                        images.push(fullUrl);
                    }
                });

                if (images.length > 0) {
                    return images;
                } else {
                    status.textContent = '未找到图片，尝试使用缩略图...';
                    // 如果原图URL失败，尝试直接使用缩略图
                    const thumbnailImages = [];
                    imgElements.forEach(img => {
                        const dataSrc = img.getAttribute('data-src');
                        if (dataSrc) {
                            thumbnailImages.push(dataSrc);
                        }
                    });
                    return thumbnailImages;
                }
            } catch (error) {
                console.error('Error fetching page:', error);
                return [];
            }
        }

        // 显示下一张图片
        async function showNextImage() {
            if (isLoading) return;
            
            const container = document.getElementById('imageContainer');
            const status = document.getElementById('status');

            // 如果当前图片列表已用完，加载下一页
            if (currentImageIndex >= imageList.length) {
                isLoading = true;
                container.innerHTML = '<p class="loading">加载中...</p>';
                
                const newImages = await fetchImagesFromPage(currentPage);
                
                if (newImages.length > 0) {
                    imageList = newImages;
                    currentImageIndex = 0;
                    currentPage++;
                } else {
                    container.innerHTML = '<p class="error">加载图片失败，请重试</p>';
                    status.textContent = '加载失败';
                    isLoading = false;
                    return;
                }
                
                isLoading = false;
            }

            // 显示当前图片
            const imgUrl = imageList[currentImageIndex];
            currentImageIndex++;

            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = 'Wallhaven图片';
            img.onerror = function() {
                // 如果原图加载失败，尝试加载缩略图
                const thumbUrl = imgUrl.replace('w.wallhaven.cc/full', 'th.wallhaven.cc/small');
                if (this.src !== thumbUrl) {
                    this.src = thumbUrl;
                } else {
                    status.textContent = '图片加载失败';
                }
            };

            img.onload = function() {
                imageCount++;
                totalImageCount++;
                saveCounter();
                updateCounterDisplay();
                status.textContent = `加载成功！第 ${currentPage-1} 页 第 ${currentImageIndex}/${imageList.length} 张`;
            };

            container.innerHTML = '';
            container.appendChild(img);
        }

        // 监听键盘事件
        document.addEventListener('keydown', function (event) {
            if (event.code === 'Space') {
                event.preventDefault(); // 阻止页面滚动
                showNextImage();
            }
        });

        // 页面加载时初始化
        window.onload = function () {
            loadCounter(); // 加载本地存储的计数
            showNextImage();
        };
    </script>
</body>

</html>
